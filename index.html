<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف سعاد الفاخرة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #fcfbf9; 
            --gold-light: #eadd96;
            --gold-metallic: #c5a037; 
            --gold-dark: #927424;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000000; 
            height: 100vh;
            overflow: hidden; 
            transition: background-color 1.5s ease;
        }

        /* =========================================
           1. واجهة المغلف (الصورة الافتتاحية)
           ========================================= */
        #opening-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('./cover.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 9999;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .click-hint {
            color: #ffffff;
            font-size: 1.1rem;
            margin-bottom: 50px;
            letter-spacing: 1px;
            z-index: 10000;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            animation: bounce 2s infinite;
            background: rgba(114, 28, 36, 0.7); 
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
        }

        /* =========================================
           2. واجهة الدعوة الداخلية (بعد الفتح)
           ========================================= */
        #invitation-content {
            opacity: 0;
            transform: scale(0.95);
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 40px 20px;
            overflow-y: auto;
        }

        .card-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            background-color: #fff;
            border: 1px solid rgba(197, 160, 55, 0.15);
            overflow: hidden;
            margin-bottom: 25px;
        }

        .card-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .details-card {
            margin-top: 20px;
            margin-bottom: 30px;
        }

        /* =========================================
           3. صورة الموقع القابلة للضغط
           ========================================= */
        .map-card {
            display: block; 
            text-decoration: none;
            margin-bottom: 50px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.4s ease;
        }

        .map-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 60px rgba(197, 160, 55, 0.3);
            border-color: var(--gold-metallic);
        }

        .map-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            color: #fff;
            padding: 30px 20px 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .map-overlay i {
            color: #ff3333; 
            margin-left: 8px;
            font-size: 1.4rem;
        }

        .map-card:hover .map-overlay {
            opacity: 1;
        }

        /* =========================================
           4. العداد التنازلي الفاخر
           ========================================= */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: -40px; 
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
            direction: ltr; 
        }

        .time-box {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid var(--gold-metallic);
            border-radius: 10px;
            padding: 15px;
            min-width: 85px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(197, 160, 55, 0.2);
            backdrop-filter: blur(5px);
        }

        .time-box span {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: var(--gold-dark);
            font-weight: 700;
            line-height: 1.1;
        }

        .time-box label {
            display: block;
            font-size: 0.95rem;
            color: #666;
            margin-top: 5px;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        @media (max-width: 600px) {
            #invitation-content { padding: 25px 15px; }
            .countdown-container { gap: 10px; margin-top: -30px; }
            .time-box { min-width: 70px; padding: 10px; }
            .time-box span { font-size: 1.8rem; }
            .time-box label { font-size: 0.85rem; }
            .map-overlay { opacity: 1; padding: 40px 10px 15px; font-size: 1.1rem; } 
        }
    </style>
</head>
<body>

    <div id="opening-screen" onclick="openInvitation()">
        <div class="click-hint">اضغط لفتح الدعوة ✉</div>
    </div>

    <div id="invitation-content">
        
        <!-- الصورة الأولى (الخواتم) -->
        <div class="card-wrapper">
            <img src="./img1.png" alt="خواتم زفاف سعاد">
        </div>

        <div class="countdown-container">
            <div class="time-box">
                <span id="seconds">00</span>
                <label>ثانية</label>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <label>دقيقة</label>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <label>ساعة</label>
            </div>
            <div class="time-box">
                <span id="days">00</span>
                <label>يوم</label>
            </div>
        </div>

        <!-- الصورة الثانية (التفاصيل) -->
        <div class="card-wrapper details-card">
            <img src="ضعي_رابط_الصورة_الثانية_هنا" alt="تفاصيل حفل زفاف سعاد">
        </div>

        <!-- الصورة الثالثة (الخريطة) -->
        <a href="https://maps.app.goo.gl/A5phCVhhYfF1xxFY6" target="_blank" class="card-wrapper map-card">
            <img src="ضعي_رابط_الصورة_الثالثة_هنا" alt="موقع قاعة الأفراح">
            <div class="map-overlay">
                <i class="fa-solid fa-location-dot"></i>
                <span>اضغط هنا لفتح الخريطة والاتجاهات</span>
            </div>
        </a>
        
    </div>

    <script>
        function openInvitation() {
            const openingScreen = document.getElementById('opening-screen');
            const invitationContent = document.getElementById('invitation-content');
            
            openingScreen.style.opacity = '0';
            openingScreen.style.transform = 'scale(1.05)';
            openingScreen.style.pointerEvents = 'none';
            
            setTimeout(() => {
                openingScreen.style.display = 'none';
                document.body.style.backgroundColor = 'var(--bg-color)'; 
                document.body.style.overflow = 'auto';
                
                invitationContent.style.opacity = '1';
                invitationContent.style.transform = 'scale(1)';
                invitationContent.style.pointerEvents = 'auto';
            }, 900);
        }

        const weddingDate = new Date("August 6, 2026 16:30:00").getTime();

        const timerFunction = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            if (distance < 0) {
                clearInterval(timerFunction);
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
