<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف عادل وسعاد</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --royal-burgundy: #721c24; /* لون المغلف العنابي */
            --gold-metallic: #d4af37; /* لون الختم والخطوط الذهبية */
            --bg-dark: #121212; /* خلفية الصفحة الافتتاحية */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            height: 100vh;
            overflow: hidden; /* لمنع التمرير قبل فتح المغلف */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 1s ease;
        }

        /* =========================================
           1. واجهة المغلف الملكي (الشاشة الافتتاحية)
           ========================================= */
        #envelope-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(10, 10, 10, 0.8), rgba(10, 10, 10, 0.9)), 
                        url('https://images.unsplash.com/photo-1546193430-c2d20e1cd977?q=80&w=1200&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .save-the-date {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            color: #ffffff;
            letter-spacing: 10px;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 50px;
            font-weight: 700;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            animation: fadeInDown 1.5s ease;
        }

        .save-the-date span {
            display: block;
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: var(--gold-metallic);
            margin: 15px 0;
        }

        /* المغلف التفاعلي */
        .envelope-wrapper {
            position: relative;
            width: 350px;
            height: 250px;
            background-color: var(--royal-burgundy);
            border-radius: 5px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            cursor: pointer;
            transition: transform 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: bounceIn 1.5s ease;
        }

        /* خطوط المغلف الوهمية (لتشبه الظرف الحقيقي) */
        .envelope-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid rgba(255, 255, 255, 0.05);
            clip-path: polygon(0 0, 50% 50%, 100% 0, 100% 100%, 0 100%);
        }

        .envelope-wrapper:hover {
            transform: scale(1.05);
        }

        .envelope-monogram {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
            pointer-events: none;
            z-index: 2;
            margin-bottom: 30px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .wax-seal {
            position: absolute;
            bottom: -20px;
            width: 80px;
            height: 80px;
            background: radial-gradient(#90232b, #4a0e13);
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
            border: 2px solid #36090d;
        }

        .wax-seal i {
            color: var(--gold-metallic);
            font-size: 2rem;
            opacity: 0.9;
            animation: pulse 2s infinite;
        }

        .click-hint {
            color: #dddddd;
            font-size: 1rem;
            margin-top: 50px;
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* =========================================
           2. واجهة بطاقة الزفاف (تظهر بعد الفتح)
           ========================================= */
        #invitation-content {
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            overflow-y: auto;
        }

        /* إطار البطاقة الذي يحمل صورة Canva الخاصة بك */
        .card-image-container {
            width: 100%;
            max-width: 1000px; /* حجم كبير يناسب جودة الصورة */
            margin: 0 auto;
            border-radius: 8px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            background-color: #ffffff;
            margin-bottom: 30px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .card-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* زر خرائط جوجل الفاخر أسفل البطاقة */
        .map-btn-container {
            margin-bottom: 50px;
            text-align: center;
        }

        .btn-gold {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #c5a037, #eadd96, #c5a037);
            color: #1a1a1a;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Cairo', sans-serif;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(197, 160, 55, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(197, 160, 55, 0.5);
        }

        /* الأنماط الحركية */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.5); }
            60% { opacity: 1; transform: scale(1.05); }
            80% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* متوافق مع شاشات الجوال */
        @media (max-width: 768px) {
            .save-the-date { font-size: 2.8rem; }
            .envelope-wrapper { width: 300px; height: 210px; }
            .envelope-monogram { font-size: 3rem; }
            #invitation-content { padding: 10px; }
            .card-image-container { border-radius: 4px; }
            .btn-gold { padding: 12px 30px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- 1. الشاشة الافتتاحية (المغلف) -->
    <div id="envelope-screen" onclick="openEnvelope()">
        <h1 class="save-the-date">
            SAVE
            <span>THE DATE</span>
            DATE
        </h1>
        
        <div class="envelope-wrapper">
            <div class="envelope-monogram">A&S</div>
            <div class="wax-seal">
                <i class="fa-solid fa-heart"></i>
            </div>
        </div>
        
        <p class="click-hint">اضغط على الختم لفتح الدعوة</p>
    </div>

    <!-- 2. المحتوى الفعلي (يظهر بعد الفتح) -->
    <div id="invitation-content">
        <!-- استخدام صورتك المرفقة كبطاقة أساسية -->
        <div class="card-image-container">
            <img src="Screenshot_20260705_214656_Canva_2.jpg" alt="بطاقة دعوة زفاف عادل وسعاد">
        </div>

        <!-- زر الانتقال لموقع القاعة -->
        <div class="map-btn-container">
            <a href="https://maps.app.goo.gl/A5phCVhhYfF1xxFY6" target="_blank" class="btn-gold">
                <i class="fa-solid fa-location-dot"></i> موقع القاعة على خرائط جوجل
            </a>
        </div>
    </div>

    <script>
        function openEnvelope() {
            const envelopeScreen = document.getElementById('envelope-screen');
            const invitationContent = document.getElementById('invitation-content');
            
            // 1. إخفاء شاشة المغلف
            envelopeScreen.style.opacity = '0';
            envelopeScreen.style.transform = 'scale(1.1)';
            envelopeScreen.style.pointerEvents = 'none';
            
            // 2. إظهار البطاقة وتغيير لون الخلفية بعد مهلة قصيرة
            setTimeout(() => {
                envelopeScreen.style.display = 'none'; // إزالة المغلف نهائياً
                
                // تغيير خلفية الموقع للون يتناسب مع بطاقتك (أوف وايت / كريمي فاتح)
                document.body.style.backgroundColor = '#fcfbf9'; 
                document.body.style.overflow = 'auto'; // السماح بالتمرير
                
                // إظهار المحتوى
                invitationContent.style.opacity = '1';
                invitationContent.style.transform = 'translateY(0) scale(1)';
                invitationContent.style.pointerEvents = 'auto';
            }, 800);
        }
    </script>
</body>
</html>
